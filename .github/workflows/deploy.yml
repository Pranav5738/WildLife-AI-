name: Build and Deploy to Render

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: |
          cd wildlife
          ./mvnw clean package -DskipTests
      
      - name: Check JAR was created
        run: |
          if [ -f wildlife/target/*.jar ]; then
            echo "✓ JAR file created successfully"
            ls -lh wildlife/target/*.jar
          else
            echo "✗ JAR file not found"
            exit 1
          fi
      
      - name: Notify Render on Push
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Push detected on main branch"
          echo "Render will automatically deploy based on webhook configuration"
