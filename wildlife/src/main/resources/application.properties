# ===============================
# APPLICATION
# ===============================
spring.application.name=wildlife

# ===============================
# SERVER PORT (RENDER FIX)
# ===============================
server.port=${PORT:8080}

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ===============================
# FILE UPLOAD
# ===============================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ===============================
# DATABASE (POSTGRESQL)
# ===============================

# Use ONLY SPRING_DATASOURCE_URL (recommended)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Let Spring auto-detect dialect (cleaner)
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===============================
# TWILIO
# ===============================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}
user.phone.number=${USER_PHONE_NUMBER}

# ===============================
# AWS S3
# ===============================
aws.accessKey=${AWS_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
aws.secretKey=${AWS_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
aws.region=${AWS_REGION}
aws.bucketName=${AWS_BUCKET_NAME:${AWS_S3_BUCKET_NAME:}}