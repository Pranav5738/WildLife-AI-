
spring.application.name=wildlife

# Server port (Render provides PORT automatically)
server.port=${PORT:8082}

# ========================
# JWT CONFIG
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ========================
# DATABASE (POSTGRESQL)
# ========================
# Supports either POSTGRES_URL or DATABASE_URL on hosting platforms.
spring.datasource.url=${POSTGRES_URL:${DATABASE_URL:${SPRING_DATASOURCE_URL:}}}
spring.datasource.username=${POSTGRES_USER:${SPRING_DATASOURCE_USERNAME:}}
spring.datasource.password=${POSTGRES_PASSWORD:${SPRING_DATASOURCE_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ========================
# TWILIO
# ========================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.phone.number=${TWILIO_PHONE_NUMBER}

user.phone.number=${USER_PHONE_NUMBER}

# ========================
# AWS S3
# ========================
aws.accessKey=${AWS_ACCESS_KEY:${AWS_ACCESS_KEY_ID:}}
aws.secretKey=${AWS_SECRET_KEY:${AWS_SECRET_ACCESS_KEY:}}
aws.region=${AWS_REGION}
aws.bucketName=${AWS_BUCKET_NAME:${AWS_S3_BUCKET_NAME:}}
